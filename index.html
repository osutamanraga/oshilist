    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));

    margin-top: 20px;

  .card {
    background: white;
    padding: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
  }

  .card a {
    text-decoration: none;
    font-weight: bold;
    color: #1da1f2;
  }

  .card small {
    display: block;
    margin-top: 6px;
    color: #666;
  }
</style>
</head>
